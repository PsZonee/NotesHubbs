<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>NOTESHUBS | Class 12 Visual Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #fff5f9;
      color: #1e1a2b;
    }
    .header {
      background: linear-gradient(135deg, #ffffff 0%, #fff0f5 100%);
      border-bottom: 2px solid #ffd9e8;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,0.92);
    }
    .logo h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e83e8c, #ff85b3);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo p {
      font-size: 0.7rem;
      color: #b13e6b;
      margin-top: 2px;
    }
    .upload-area {
      display: flex;
      gap: 12px;
      align-items: center;
      background: #fff0f5;
      padding: 6px 16px;
      border-radius: 60px;
      border: 1.5px solid #ffc0d4;
      flex-wrap: wrap;
    }
    .upload-preview {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .preview-thumb {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #ffc0d4;
      display: none;
    }
    .upload-label {
      background: #e83e8c;
      color: white;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .upload-label:hover {
      background: #c72a74;
      transform: scale(0.97);
    }
    #uploadStatus {
      font-size: 0.75rem;
      color: #2b7a3e;
    }
    .subjects-tab {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 20px 24px 8px 24px;
      border-bottom: 1px solid #ffe2ec;
      background: white;
    }
    .subject-btn {
      background: #fff0f5;
      border: none;
      padding: 10px 28px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #b13e6b;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .subject-btn.active {
      background: #e83e8c;
      color: white;
      box-shadow: 0 6px 14px rgba(232,62,140,0.3);
    }
    .notes-container {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      padding-left: 12px;
      border-left: 5px solid #e83e8c;
      color: #2d2a3b;
    }
    .add-note-btn {
      background: #e83e8c;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .note-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      border: 1.5px solid #ffe2ec;
      transition: 0.2s;
      cursor: pointer;
    }
    .note-card:hover {
      transform: translateY(-4px);
      border-color: #ffb7cb;
      box-shadow: 0 20px 28px -12px rgba(232,62,140,0.2);
    }
    .card-img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #fef0f5;
    }
    .card-info {
      padding: 14px 16px 16px;
    }
    .card-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .action-buttons {
      display: flex;
      gap: 6px;
    }
    .edit-btn, .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 4px 8px;
      border-radius: 30px;
    }
    .edit-btn {
      color: #e83e8c;
    }
    .edit-btn:hover {
      background: #fff0f5;
    }
    .delete-btn {
      color: #e83e8c;
    }
    .delete-btn:hover {
      background: #ffe4ed;
      color: #c72a74;
    }
    .card-desc {
      font-size: 0.7rem;
      color: #8e6b7c;
    }
    .empty-message {
      grid-column: 1/-1;
      text-align: center;
      padding: 50px;
      color: #b98aa2;
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .image-modal {
      background: transparent;
      max-width: 90vw;
      max-height: 90vh;
      position: relative;
    }
    .image-modal img {
      max-width: 100%;
      max-height: 85vh;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .close-modal {
      position: absolute;
      top: -40px;
      right: -10px;
      font-size: 32px;
      cursor: pointer;
      color: white;
      background: rgba(0,0,0,0.5);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .close-modal:hover {
      background: #e83e8c;
    }
    footer {
      text-align: center;
      padding: 24px;
      margin-top: 20px;
      border-top: 1px solid #ffe2ec;
      font-size: 0.75rem;
      color: #b56576;
    }
    @media (max-width: 640px) {
      .header {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }
      .upload-area {
        justify-content: center;
      }
      .notes-grid {
        grid-template-columns: 1fr;
      }
      .subjects-tab {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <h1><i class="fas fa-graduation-cap" style="color:#e83e8c;"></i> NOTESHUBS</h1>
    <p>Class 12 • Click 'Edit' to paste your GitHub raw image link</p>
  </div>
  <div class="upload-area">
    <input type="file" id="fileUploadInput" accept="image/*" style="display:none;">
    <div class="upload-preview">
      <img id="uploadPreviewImg" class="preview-thumb" alt="preview">
      <span id="uploadFileName" style="font-size:0.75rem; color:#b13e6b;"></span>
    </div>
    <button class="upload-label" id="uploadFileBtn"><i class="fas fa-cloud-upload-alt"></i> Upload Note</button>
    <span id="uploadStatus"></span>
  </div>
</div>

<div class="subjects-tab" id="subjectTabs">
  <button class="subject-btn active" data-subj="math"><i class="fas fa-calculator"></i> Mathematics</button>
  <button class="subject-btn" data-subj="physics"><i class="fas fa-atom"></i> Physics</button>
  <button class="subject-btn" data-subj="chemistry"><i class="fas fa-flask"></i> Chemistry</button>
  <button class="subject-btn" data-subj="english"><i class="fas fa-book-open"></i> English</button>
</div>

<div class="notes-container">
  <div class="section-header">
    <div class="section-title" id="activeSubjectTitle">📐 Mathematics</div>
    <button class="add-note-btn" id="addNoteBtn"><i class="fas fa-plus-circle"></i> Add New Note</button>
  </div>
  <div id="notesGrid" class="notes-grid"></div>
</div>

<footer>
  <i class="fas fa-heart" style="color:#e83e8c;"></i> Click any image to enlarge • Edit note to replace placeholder with your actual GitHub raw image link.
</footer>

<div id="imageModal" class="modal-overlay">
  <div class="image-modal">
    <span class="close-modal" id="closeImageModal">&times;</span>
    <img id="modalImage" src="" alt="Preview">
  </div>
</div>

<script>
  // ========== IMGBB API KEY ==========
  const IMGBB_API_KEY = "39b5590e3585c6c22b60701b36155d3b";
  
  // ========== NOTES DATABASE (with your exact filenames as placeholders) ==========
  let notesData = [

    { id: 1, subject: "chemistry", title: "Chemistry 671585061", imageUrl: "https://via.placeholder.com/600x400?text=chemistry/671585061_122109315255283911_3156911350345947087_n.jpg", desc: "Click Edit → paste GitHub raw link" },
    { id: 2, subject: "chemistry", title: "Chemistry 672691275", imageUrl: "https://via.placeholder.com/600x400?text=chemistry/672691275_122109315249283911_6691752846088755241_n.jpg", desc: "Edit to add real image" },

    { id: 7, subject: "chemistry", title: "Screenshot 071351", imageUrl: "https://via.placeholder.com/600x400?text=chemistry/Screenshot+2026-04-24+071351.png", desc: "Edit to add real image" },
    { id: 8, subject: "chemistry", title: "Screenshot 071357", imageUrl: "https://via.placeholder.com/600x400?text=chemistry/Screenshot+2026-04-24+071357.png", desc: "Paste your GitHub raw link" },
    { id: 9, subject: "chemistry", title: "Screenshot 071403", imageUrl: "https://via.placeholder.com/600x400?text=chemistry/Screenshot+2026-04-24+071403.png", desc: "Click Edit" },
    { id: 10, subject: "chemistry", title: "Screenshot 071411", imageUrl: "https://via.placeholder.com/600x400?text=chemistry/Screenshot+2026-04-24+071411.png", desc: "Replace link" },
    { id: 11, subject: "chemistry", title: "Screenshot 071418", imageUrl: "https://via.placeholder.com/600x400?text=chemistry/Screenshot+2026-04-24+071418.png", desc: "Edit to add URL" },
    // Mathematics
    { id: 12, subject: "math", title: "Math 667987983", imageUrl: "https://via.placeholder.com/600x400?text=Math/667987983_122228570132326428_659498413692828923_n.jpg", desc: "Edit → paste GitHub raw link" },
    { id: 13, subject: "math", title: "Math 673640429", imageUrl: "https://via.placeholder.com/600x400?text=Math/673640429_122230037078326428_8201432397743733965_n.jpg", desc: "Replace placeholder" },

    { id: 15, subject: "math", title: "Math 674444166", imageUrl: "https://via.placeholder.com/600x400?text=Math/674444166_122230037168326428_6467345128106203806_n.jpg", desc: "Edit to add image" },
    { id: 16, subject: "math", title: "Math 675190078", imageUrl: "https://via.placeholder.com/600x400?text=Math/675190078_122230151534326428_8741963825995436161_n.jpg", desc: "Replace with GitHub raw" },
    { id: 17, subject: "math", title: "Math 675578771", imageUrl: "https://via.placeholder.com/600x400?text=Math/675578771_122230151618326428_2117698523574390344_n.jpg", desc: "Click Edit" },
    { id: 18, subject: "math", title: "Math 676923152", imageUrl: "https://via.placeholder.com/600x400?text=Math/676923152_122230037126326428_5555090164868953875_n.jpg", desc: "Paste link" },
    // Physics
    { id: 19, subject: "physics", title: "Physics 668556295", imageUrl: "https://via.placeholder.com/600x400?text=physics/668556295_122229217736326428_5800344575183112312_n.jpg", desc: "Edit → paste GitHub raw link" },
    { id: 20, subject: "physics", title: "Physics 668984038", imageUrl: "https://via.placeholder.com/600x400?text=physics/668984038_122229217604326428_5132577566145805611_n.jpg", desc: "Replace placeholder" },
    { id: 21, subject: "physics", title: "Physics 669388747", imageUrl: "https://via.placeholder.com/600x400?text=physics/669388747_122229217646326428_8455232024208187568_n.jpg", desc: "Add URL" },
    { id: 22, subject: "physics", title: "Physics 669852976", imageUrl: "https://via.placeholder.com/600x400?text=physics/669852976_122229217562326428_5489529908280898506_n.jpg", desc: "Edit" },
    { id: 23, subject: "physics", title: "Physics 670503463", imageUrl: "https://via.placeholder.com/600x400?text=physics/670503463_122229217694326428_129556564390315859_n.jpg", desc: "Paste raw link" },
    { id: 24, subject: "physics", title: "Physics 671831426", imageUrl: "https://via.placeholder.com/600x400?text=physics/671831426_122229899888326428_4331728191937438986_n.jpg", desc: "Replace" },
    { id: 25, subject: "physics", title: "Physics 674059450", imageUrl: "https://via.placeholder.com/600x400?text=physics/674059450_122229899840326428_1849670502064263688_n.jpg", desc: "Edit to add URL" },
    { id: 26, subject: "physics", title: "Physics 676838556", imageUrl: "https://via.placeholder.com/600x400?text=physics/676838556_122199786338520585_7280878525199820986_n.jpg", desc: "Click Edit" },
    { id: 27, subject: "physics", title: "Physics 676923357", imageUrl: "https://via.placeholder.com/600x400?text=physics/676923357_122199786146520585_8416927790836267373_n+%281%29.jpg", desc: "Paste your link" },
    // English
    { id: 28, subject: "english", title: "English 071717", imageUrl: "https://via.placeholder.com/600x400?text=english/Screenshot+2026-04-24+071717.png", desc: "Edit → paste GitHub raw link" },
    { id: 29, subject: "english", title: "English 071726", imageUrl: "https://via.placeholder.com/600x400?text=english/Screenshot+2026-04-24+071726.png", desc: "Replace placeholder" },
    { id: 30, subject: "english", title: "English 071733", imageUrl: "https://via.placeholder.com/600x400?text=english/Screenshot+2026-04-24+071733.png", desc: "Add URL" },
    { id: 31, subject: "english", title: "English 071738", imageUrl: "https://via.placeholder.com/600x400?text=english/Screenshot+2026-04-24+071738.png", desc: "Edit" },
    { id: 32, subject: "english", title: "English 071744", imageUrl: "https://via.placeholder.com/600x400?text=english/Screenshot+2026-04-24+071744.png", desc: "Paste raw link" },
    { id: 33, subject: "english", title: "English 071751", imageUrl: "https://via.placeholder.com/600x400?text=english/Screenshot+2026-04-24+071751.png", desc: "Replace" },
  ];

  function saveData() {
    localStorage.setItem("noteshub_visual_final", JSON.stringify(notesData));
  }
  function loadData() {
    const stored = localStorage.getItem("noteshub_visual_final");
    if(stored) {
      notesData = JSON.parse(stored);
    } else {
      saveData();
    }
  }
  loadData();

  let currentSubject = "math";

  function renderNotes() {
    const filtered = notesData.filter(n => n.subject === currentSubject);
    const grid = document.getElementById("notesGrid");
    const titles = { math: "📐 Mathematics", physics: "⚛️ Physics", chemistry: "🧪 Chemistry", english: "📖 English" };
    document.getElementById("activeSubjectTitle").innerHTML = titles[currentSubject] || "Notes";
    if(filtered.length === 0) {
      grid.innerHTML = `<div class="empty-message"><i class="fas fa-camera" style="font-size:2rem;"></i><p>No notes yet. Click "Add New Note".</p></div>`;
      return;
    }
    grid.innerHTML = filtered.map(note => `
      <div class="note-card" data-id="${note.id}">
        <img class="card-img" src="${escapeHtml(note.imageUrl)}" alt="${escapeHtml(note.title)}" onerror="this.src='https://via.placeholder.com/600x400?text=Invalid+Link'; this.style.opacity='0.8';">
        <div class="card-info">
          <div class="card-title">
            <span>${escapeHtml(note.title)}</span>
            <div class="action-buttons">
              <button class="edit-btn" data-id="${note.id}"><i class="fas fa-pencil-alt"></i></button>
              <button class="delete-btn" data-id="${note.id}"><i class="fas fa-trash-alt"></i></button>
            </div>
          </div>
          <div class="card-desc">${escapeHtml(note.desc)}</div>
        </div>
      </div>
    `).join("");
    document.querySelectorAll('.note-card').forEach(card => {
      const img = card.querySelector('.card-img');
      card.addEventListener('click', (e) => {
        if(e.target.closest('.edit-btn') || e.target.closest('.delete-btn')) return;
        const src = img.getAttribute('src');
        if(src && !src.includes('placeholder') && !src.includes('Invalid+Link')) openImageModal(src);
        else showToast("Click Edit to paste a valid GitHub raw image URL.", 3000);
      });
    });
    document.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); editNoteById(id); });
    });
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); if(confirm("Delete this note?")) { notesData = notesData.filter(n => n.id !== id); saveData(); renderNotes(); showToast("Note deleted."); } });
    });
  }

  function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
  function editNoteById(id) {
    const note = notesData.find(n => n.id === id);
    if(!note) return;
    const newTitle = prompt("Edit title:", note.title);
    if(newTitle !== null && newTitle.trim() !== "") note.title = newTitle.trim();
    const newUrl = prompt("Paste your GitHub RAW image link (direct .jpg/.png/.gif URL):\nExample: https://raw.githubusercontent.com/username/repo/main/photo.jpg", note.imageUrl);
    if(newUrl !== null && newUrl.trim() !== "") { note.imageUrl = newUrl.trim(); note.desc = "GitHub raw image – click to enlarge"; }
    saveData(); renderNotes(); showToast("Note updated!");
  }
  function addNewNote() {
    const title = prompt("Enter a title for this note:");
    if(!title || title.trim() === "") return;
    const imageLink = prompt("Paste your GitHub RAW image link (direct image URL):");
    if(!imageLink || imageLink.trim() === "") { showToast("Image link required."); return; }
    const newNote = { id: Date.now(), subject: currentSubject, title: title.trim(), imageUrl: imageLink.trim(), desc: "Click to enlarge • GitHub raw image" };
    notesData.push(newNote); saveData(); renderNotes(); showToast("✅ New note added!");
  }

  const modal = document.getElementById("imageModal"), modalImg = document.getElementById("modalImage");
  function openImageModal(src) { modalImg.src = src; modal.classList.add("active"); document.body.style.overflow = "hidden"; }
  function closeImageModal() { modal.classList.remove("active"); document.body.style.overflow = ""; }
  document.getElementById("closeImageModal").addEventListener("click", closeImageModal);
  modal.addEventListener("click", (e) => { if(e.target === modal) closeImageModal(); });
  function showToast(msg, dur=2500) { let t=document.createElement("div"); t.innerText=msg; t.style.cssText="position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e1a2e;color:#fff;padding:10px 20px;border-radius:50px;font-size:0.85rem;z-index:3000;box-shadow:0 6px 12px rgba(0,0,0,0.2)"; document.body.appendChild(t); setTimeout(()=>t.remove(),dur); }

  document.querySelectorAll(".subject-btn").forEach(btn => { btn.addEventListener("click", () => { document.querySelectorAll(".subject-btn").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); currentSubject = btn.dataset.subj; renderNotes(); }); });
  document.getElementById("addNoteBtn").addEventListener("click", addNewNote);
  
  // ========== UPLOAD IMAGE (sends to email, shows "reviewed by admin" message) ==========
  const fileInput = document.getElementById("fileUploadInput");
  const uploadBtn = document.getElementById("uploadFileBtn");
  const uploadStatus = document.getElementById("uploadStatus");
  const previewImg = document.getElementById("uploadPreviewImg");
  const fileNameSpan = document.getElementById("uploadFileName");
  let selectedFile = null;
  fileInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if(!file) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = (ev) => { previewImg.src = ev.target.result; previewImg.style.display = "block"; fileNameSpan.textContent = file.name; };
    reader.readAsDataURL(file);
  });
  uploadBtn.addEventListener("click", async () => {
    if(!selectedFile) { fileInput.click(); return; }
    uploadStatus.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Uploading...';
    const formData = new FormData();
    formData.append("image", selectedFile);
    formData.append("key", IMGBB_API_KEY);
    try {
      const imgbbRes = await fetch("https://api.imgbb.com/1/upload", { method: "POST", body: formData });
      const imgbbData = await imgbbRes.json();
      if (!imgbbData.success) throw new Error("ImgBB upload failed");
      const imageUrl = imgbbData.data.url;
      const emailPayload = {
        name: "Class12_Student",
        message: `📸 A student uploaded an image for **${currentSubject.toUpperCase()}** subject.\n\n🖼️ **Direct Image Link:**\n${imageUrl}\n\n📁 Original file: ${selectedFile.name}\n📦 Size: ${(selectedFile.size/1024).toFixed(2)} KB\n\n✅ You can use this link in NOTESHUBS.`,
        _subject: `📖 NOTESHUBS: New Image Upload - ${selectedFile.name}`,
        _captcha: "false",
        _template: "table"
      };
      await fetch("https://formsubmit.co/ajax/sammanlamsal31@gmail.com", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(emailPayload)
      });
      // Show the admin review message
      uploadStatus.innerHTML = '✅ File uploaded! Will be reviewed by the admin soon.';
      setTimeout(() => uploadStatus.innerHTML = '', 6000);
      previewImg.style.display = "none";
      fileNameSpan.textContent = "";
      selectedFile = null;
      fileInput.value = "";
      showToast("📤 Uploaded! Admin will review.");
    } catch(err) {
      console.error(err);
      uploadStatus.innerHTML = '❌ Upload failed. Try again with a smaller image.';
      setTimeout(() => uploadStatus.innerHTML = '', 4000);
      showToast("Upload error. Please try again later.");
    }
  });
  
  renderNotes();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>NOTESHUBS | Class 12 Visual Notes (Unlimited Uploads)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #fff5f9;
      color: #1e1a2b;
    }
    .header {
      background: linear-gradient(135deg, #ffffff 0%, #fff0f5 100%);
      border-bottom: 2px solid #ffd9e8;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,0.92);
    }
    .logo h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e83e8c, #ff85b3);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo p {
      font-size: 0.7rem;
      color: #b13e6b;
      margin-top: 2px;
    }
    .upload-area {
      display: flex;
      gap: 12px;
      align-items: center;
      background: #fff0f5;
      padding: 6px 16px;
      border-radius: 60px;
      border: 1.5px solid #ffc0d4;
      flex-wrap: wrap;
    }
    .upload-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .upload-preview {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      max-width: 220px;
    }
    .preview-thumb {
      width: 45px;
      height: 45px;
      object-fit: cover;
      border-radius: 12px;
      border: 1.5px solid #ffc0d4;
      background: white;
    }
    .upload-label {
      background: #e83e8c;
      color: white;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: none;
    }
    .upload-label:hover {
      background: #c72a74;
      transform: scale(0.97);
    }
    .camera-btn {
      background: #4a6fa5;
    }
    .camera-btn:hover {
      background: #3a5a85;
    }
    #uploadStatus {
      font-size: 0.75rem;
      color: #2b7a3e;
      margin-top: 6px;
      width: 100%;
      text-align: center;
    }
    .subjects-tab {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 20px 24px 8px 24px;
      border-bottom: 1px solid #ffe2ec;
      background: white;
    }
    .subject-btn {
      background: #fff0f5;
      border: none;
      padding: 10px 28px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #b13e6b;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .subject-btn.active {
      background: #e83e8c;
      color: white;
      box-shadow: 0 6px 14px rgba(232,62,140,0.3);
    }
    .notes-container {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      padding-left: 12px;
      border-left: 5px solid #e83e8c;
      color: #2d2a3b;
    }
    .add-note-btn {
      background: #e83e8c;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .note-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      border: 1.5px solid #ffe2ec;
      transition: 0.2s;
      cursor: pointer;
    }
    .note-card:hover {
      transform: translateY(-4px);
      border-color: #ffb7cb;
      box-shadow: 0 20px 28px -12px rgba(232,62,140,0.2);
    }
    .card-img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #fef0f5;
    }
    .card-info {
      padding: 14px 16px 16px;
    }
    .card-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .action-buttons {
      display: flex;
      gap: 6px;
    }
    .edit-btn, .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 4px 8px;
      border-radius: 30px;
    }
    .edit-btn {
      color: #e83e8c;
    }
    .edit-btn:hover {
      background: #fff0f5;
    }
    .delete-btn {
      color: #e83e8c;
    }
    .delete-btn:hover {
      background: #ffe4ed;
      color: #c72a74;
    }
    .card-desc {
      font-size: 0.7rem;
      color: #8e6b7c;
    }
    .empty-message {
      grid-column: 1/-1;
      text-align: center;
      padding: 50px;
      color: #b98aa2;
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .image-modal {
      background: transparent;
      max-width: 90vw;
      max-height: 90vh;
      position: relative;
    }
    .image-modal img {
      max-width: 100%;
      max-height: 85vh;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .close-modal {
      position: absolute;
      top: -40px;
      right: -10px;
      font-size: 32px;
      cursor: pointer;
      color: white;
      background: rgba(0,0,0,0.5);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .close-modal:hover {
      background: #e83e8c;
    }
    footer {
      text-align: center;
      padding: 24px;
      margin-top: 20px;
      border-top: 1px solid #ffe2ec;
      font-size: 0.75rem;
      color: #b56576;
    }
    @media (max-width: 640px) {
      .header {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }
      .upload-area {
        justify-content: center;
      }
      .notes-grid {
        grid-template-columns: 1fr;
      }
      .subjects-tab {
        justify-content: center;
      }
      .upload-buttons {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <h1><i class="fas fa-graduation-cap" style="color:#e83e8c;"></i> NOTESHUBS</h1>
    <p>Class 12 • Unlimited uploads • Works on mobile & laptop</p>
  </div>
  <div class="upload-area">
    <div class="upload-buttons">
      <input type="file" id="galleryInput" accept="image/*" multiple style="display:none;">
      <input type="file" id="cameraInput" accept="image/*" capture style="display:none;">

      <button class="upload-label camera-btn" id="cameraBtn"><i class="fas fa-camera"></i> Take Photo</button>
      <button class="upload-label" id="uploadBtn"><i class="fas fa-cloud-upload-alt"></i> Upload All</button>
    </div>
    <div id="previewContainer" class="upload-preview"></div>
    <span id="uploadStatus"></span>
  </div>
</div>

<div class="subjects-tab" id="subjectTabs">
  <button class="subject-btn active" data-subj="math"><i class="fas fa-calculator"></i> Mathematics</button>
  <button class="subject-btn" data-subj="physics"><i class="fas fa-atom"></i> Physics</button>
  <button class="subject-btn" data-subj="chemistry"><i class="fas fa-flask"></i> Chemistry</button>
  <button class="subject-btn" data-subj="english"><i class="fas fa-book-open"></i> English</button>
</div>

<div class="notes-container">
  <div class="section-header">
    <div class="section-title" id="activeSubjectTitle">📐 Mathematics</div>
    <button class="add-note-btn" id="addNoteBtn"><i class="fas fa-plus-circle"></i> Add New Note</button>
  </div>
  <div id="notesGrid" class="notes-grid"></div>
</div>

<footer>
  <i class="fas fa-heart" style="color:#e83e8c;"></i> Click any image to enlarge • Upload unlimited photos (camera or gallery) – admin receives every link.
</footer>

<div id="imageModal" class="modal-overlay">
  <div class="image-modal">
    <span class="close-modal" id="closeImageModal">&times;</span>
    <img id="modalImage" src="" alt="Preview">
  </div>
</div>

  let currentSubject = "math";

  function renderNotes() {
    const filtered = notesData.filter(n => n.subject === currentSubject);
    const grid = document.getElementById("notesGrid");
    const titles = { math: "📐 Mathematics", physics: "⚛️ Physics", chemistry: "🧪 Chemistry", english: "📖 English" };
    document.getElementById("activeSubjectTitle").innerHTML = titles[currentSubject] || "Notes";
    if(filtered.length === 0) {
      grid.innerHTML = `<div class="empty-message"><i class="fas fa-camera" style="font-size:2rem;"></i><p>No notes yet. Click "Add New Note".</p></div>`;
      return;
    }
    grid.innerHTML = filtered.map(note => `
      <div class="note-card" data-id="${note.id}">
        <img class="card-img" src="${escapeHtml(note.imageUrl)}" alt="${escapeHtml(note.title)}" onerror="this.src='https://via.placeholder.com/600x400?text=Failed+to+load'; this.style.opacity='0.7';">
        <div class="card-info">
          <div class="card-title">
            <span>${escapeHtml(note.title)}</span>
            <div class="action-buttons">
              <button class="edit-btn" data-id="${note.id}"><i class="fas fa-pencil-alt"></i></button>
              <button class="delete-btn" data-id="${note.id}"><i class="fas fa-trash-alt"></i></button>
            </div>
          </div>
          <div class="card-desc">${escapeHtml(note.desc)}</div>
        </div>
      </div>
    `).join("");
    document.querySelectorAll('.note-card').forEach(card => {
      const img = card.querySelector('.card-img');
      card.addEventListener('click', (e) => {
        if(e.target.closest('.edit-btn') || e.target.closest('.delete-btn')) return;
        const src = img.getAttribute('src');
        if(src && !src.includes('placeholder') && !src.includes('Failed+to+load')) openImageModal(src);
        else showToast("Image could not be loaded. Please check the link.", 3000);
      });
    });
    document.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); editNoteById(id); });
    });
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); if(confirm("Delete this note?")) { 
        const index = notesData.findIndex(n => n.id === id);
        if(index !== -1) notesData.splice(index, 1);
        saveToLocal();
        renderNotes(); showToast("Note deleted.");
      } });
    });
  }

  function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
  
  function saveToLocal() {
    localStorage.setItem("noteshub_visual_v5", JSON.stringify(notesData));
  }
  function loadFromLocal() {
    const stored = localStorage.getItem("noteshub_visual_v5");
    if(stored) {
      const saved = JSON.parse(stored);
      notesData.length = 0;
      saved.forEach(item => notesData.push(item));
    }
  }
  loadFromLocal();

  function editNoteById(id) {
    const note = notesData.find(n => n.id === id);
    if(!note) return;
    const newTitle = prompt("Edit title:", note.title);
    if(newTitle !== null && newTitle.trim() !== "") note.title = newTitle.trim();
    const newUrl = prompt("Edit image URL (GitHub raw link):", note.imageUrl);
    if(newUrl !== null && newUrl.trim() !== "") { note.imageUrl = newUrl.trim(); note.desc = "Click to enlarge"; }
    saveToLocal(); renderNotes(); showToast("Note updated!");
  }
  function addNewNote() {
    const title = prompt("Enter a title for this note:");
    if(!title || title.trim() === "") return;
    const imageLink = prompt("Paste your GitHub raw image link (direct .jpg/.png/.gif URL):");
    if(!imageLink || imageLink.trim() === "") { showToast("Image link required."); return; }
    const newId = Date.now();
    const newNote = { id: newId, subject: currentSubject, title: title.trim(), imageUrl: imageLink.trim(), desc: "Click to enlarge" };
    notesData.push(newNote);
    saveToLocal(); renderNotes(); showToast("✅ New note added!");
  }

  const modal = document.getElementById("imageModal"), modalImg = document.getElementById("modalImage");
  function openImageModal(src) { modalImg.src = src; modal.classList.add("active"); document.body.style.overflow = "hidden"; }
  function closeImageModal() { modal.classList.remove("active"); document.body.style.overflow = ""; }
  document.getElementById("closeImageModal").addEventListener("click", closeImageModal);
  modal.addEventListener("click", (e) => { if(e.target === modal) closeImageModal(); });
  function showToast(msg, dur=2500) { let t=document.createElement("div"); t.innerText=msg; t.style.cssText="position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e1a2e;color:#fff;padding:10px 20px;border-radius:50px;font-size:0.85rem;z-index:3000;box-shadow:0 6px 12px rgba(0,0,0,0.2)"; document.body.appendChild(t); setTimeout(()=>t.remove(),dur); }

  document.querySelectorAll(".subject-btn").forEach(btn => { btn.addEventListener("click", () => { document.querySelectorAll(".subject-btn").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); currentSubject = btn.dataset.subj; renderNotes(); }); });
  document.getElementById("addNoteBtn").addEventListener("click", addNewNote);
  
  // ========== UNLIMITED UPLOAD USING TELEGRAPH (no API key, no daily limits) ==========
  const galleryInput = document.getElementById("galleryInput");
  const cameraInput = document.getElementById("cameraInput");
  const galleryBtn = document.getElementById("galleryBtn");
  const cameraBtn = document.getElementById("cameraBtn");
  const uploadBtn = document.getElementById("uploadBtn");
  const uploadStatus = document.getElementById("uploadStatus");
  const previewContainer = document.getElementById("previewContainer");
  let selectedFiles = [];

  function addFilesToQueue(files) {
    const fileArray = Array.from(files);
    fileArray.forEach(file => {
      if (file.type.startsWith("image/")) {
        selectedFiles.push(file);
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = document.createElement("img");
          img.src = ev.target.result;
          img.className = "preview-thumb";
          img.title = file.name;
          previewContainer.appendChild(img);
        };
        reader.readAsDataURL(file);
      }
    });
    if (fileArray.length > 0) showToast(`${fileArray.length} image(s) added. Click "Upload All" to send.`);
  }

  galleryBtn.addEventListener("click", () => galleryInput.click());
  galleryInput.addEventListener("change", (e) => {
    if (e.target.files.length) addFilesToQueue(e.target.files);
    galleryInput.value = "";
  });

  cameraBtn.addEventListener("click", () => {
    cameraInput.value = "";
    cameraInput.click();
  });
  cameraInput.addEventListener("change", (e) => {
    if (e.target.files.length) addFilesToQueue(e.target.files);
    cameraInput.value = "";
  });

  async function uploadToTelegraph(file) {
    const formData = new FormData();
    formData.append("file", file);
    const response = await fetch(TELEGRAPH_UPLOAD_URL, {
      method: "POST",
      body: formData
    });
    const data = await response.json();
    if (data && data[0] && data[0].src) {
      return "https://telegra.ph" + data[0].src;
    } else {
      throw new Error("Telegraph upload failed");
    }
  }

  uploadBtn.addEventListener("click", async () => {
    if (selectedFiles.length === 0) {
      showToast("Please select or capture at least one photo first.", 3000);
      return;
    }
    uploadStatus.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> Uploading ${selectedFiles.length} image(s) to unlimited host...`;
    
    const uploadedUrls = [];
    let successCount = 0;
    let failCount = 0;

    for (const file of selectedFiles) {
      try {
        const imageUrl = await uploadToTelegraph(file);
        uploadedUrls.push({ name: file.name, url: imageUrl });
        successCount++;
      } catch (err) {
        failCount++;
        console.error(err);
      }
    }

    if (successCount > 0) {
      let linksHtml = "";
      uploadedUrls.forEach(item => {
        linksHtml += `\n📷 **${item.name}** : ${item.url}`;
      });
      const emailPayload = {
        name: "Class12_Student",
        message: `📸 A student uploaded ${successCount} image(s) for **${currentSubject.toUpperCase()}** subject.\n\n${linksHtml}\n\n✅ Use these **unlimited** links in NOTESHUBS.`,
        _subject: `📖 NOTESHUBS: ${successCount} New Image(s) Uploaded - ${currentSubject.toUpperCase()}`,
        _captcha: "false",
        _template: "table"
      };
      try {
        await fetch("https://formsubmit.co/ajax/sammanlamsal31@gmail.com", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(emailPayload)
        });
        uploadStatus.innerHTML = `✅ ${successCount} file(s) uploaded (unlimited host)! Will be reviewed by the admin soon. ${failCount > 0 ? `(${failCount} failed)` : ""}`;
        showToast(`✅ Uploaded! Admin will review.`);
      } catch (err) {
        uploadStatus.innerHTML = `✅ Images uploaded but email notification had an issue. Admin still has the links?`;
      }
    } else {
      uploadStatus.innerHTML = `❌ Upload failed. Try again with smaller images.`;
      showToast("Upload failed. Please try again.");
    }
    
    setTimeout(() => uploadStatus.innerHTML = '', 8000);
    selectedFiles = [];
    previewContainer.innerHTML = "";
  });

  renderNotes();
</script>
</body>
</html>
